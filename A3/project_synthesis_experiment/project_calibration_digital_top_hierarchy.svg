<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="760" viewBox="0 0 1300 760">
  <style>
    .title { font: 700 28px sans-serif; fill: #111827; }
    .subtitle { font: 500 16px sans-serif; fill: #4b5563; }
    .label { font: 600 18px sans-serif; fill: #111827; }
    .small { font: 500 14px sans-serif; fill: #374151; }
    .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 16; ry: 16; }
    .chip { fill: #eef2ff; stroke: #3730a3; stroke-width: 2; rx: 16; ry: 16; }
    .chan { fill: #ecfeff; stroke: #155e75; stroke-width: 2; rx: 14; ry: 14; }
    .arrow { stroke: #4b5563; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .brace { stroke: #0f766e; stroke-width: 3; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4b5563"/>
    </marker>
  </defs>

  <text x="60" y="60" class="title">Synthesized Project Calibration Digital Path</text>
  <text x="60" y="92" class="subtitle">Behavioral ADC and analog calibration plant excluded. Only the implemented RTL calibration logic is shown.</text>

  <rect x="60" y="150" width="220" height="140" class="box"/>
  <text x="170" y="195" text-anchor="middle" class="label">sense_force</text>
  <text x="170" y="225" text-anchor="middle" class="small">raw-code trigger decode</text>
  <text x="170" y="248" text-anchor="middle" class="small">Y gate + comparator family</text>
  <text x="170" y="271" text-anchor="middle" class="small">five DAC A/B pairs</text>

  <rect x="360" y="150" width="220" height="140" class="box"/>
  <text x="470" y="195" text-anchor="middle" class="label">sign_extract</text>
  <text x="470" y="225" text-anchor="middle" class="small">valid &amp;&amp; (D15 xor D16)</text>
  <text x="470" y="248" text-anchor="middle" class="small">10 -&gt; increment request</text>
  <text x="470" y="271" text-anchor="middle" class="small">01 -&gt; decrement request</text>

  <rect x="690" y="120" width="520" height="560" class="chip"/>
  <text x="950" y="160" text-anchor="middle" class="label">Six Synthesized Calibration Channels</text>
  <text x="950" y="186" text-anchor="middle" class="small">Five DAC trim loops + one comparator trim loop</text>

  <rect x="740" y="220" width="420" height="70" class="chan"/>
  <text x="950" y="248" text-anchor="middle" class="label">Channel 0</text>
  <text x="950" y="273" text-anchor="middle" class="small">lpf_counter -&gt; cal_register</text>

  <rect x="740" y="305" width="420" height="70" class="chan"/>
  <text x="950" y="333" text-anchor="middle" class="label">Channel 1</text>
  <text x="950" y="358" text-anchor="middle" class="small">lpf_counter -&gt; cal_register</text>

  <rect x="740" y="390" width="420" height="70" class="chan"/>
  <text x="950" y="418" text-anchor="middle" class="label">Channel 2</text>
  <text x="950" y="443" text-anchor="middle" class="small">lpf_counter -&gt; cal_register</text>

  <rect x="740" y="475" width="420" height="70" class="chan"/>
  <text x="950" y="503" text-anchor="middle" class="label">Channel 3</text>
  <text x="950" y="528" text-anchor="middle" class="small">lpf_counter -&gt; cal_register</text>

  <rect x="740" y="560" width="420" height="70" class="chan"/>
  <text x="950" y="588" text-anchor="middle" class="label">Channels 4 and 5</text>
  <text x="950" y="613" text-anchor="middle" class="small">same synthesized pair repeated for DAC4 and comparator</text>

  <path d="M280 220 L360 220" class="arrow"/>
  <path d="M580 220 L640 220 L640 255 L740 255" class="arrow"/>
  <path d="M580 220 L640 220 L640 340 L740 340" class="arrow"/>
  <path d="M580 220 L640 220 L640 425 L740 425" class="arrow"/>
  <path d="M580 220 L640 220 L640 510 L740 510" class="arrow"/>
  <path d="M580 220 L640 220 L640 595 L740 595" class="arrow"/>

  <text x="320" y="210" class="small">cal_active, mode, channel, ab_sel</text>
  <text x="615" y="205" class="small">inc_i / dec_i routed by selected channel</text>

  <path d="M1185 220 C1220 220,1220 630,1185 630" class="brace"/>
  <text x="1238" y="430" transform="rotate(90 1238 430)" class="small">12 synthesized sequential blocks total</text>

  <text x="60" y="720" class="subtitle">Synthesized top-level hierarchy from project_calibration_digital_top: 1 sense_force, 1 sign_extract, 6 lpf_counter, 6 cal_register.</text>
</svg>
